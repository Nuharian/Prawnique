<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Product details - Prawnique">
    <title>Product - Prawnique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="/favicon.png">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar scrolled" id="navbar">
        <div class="container">
            <a href="/" class="logo"><img src="/img/logo.png" alt="Prawnique" class="logo-image"></a>
            <div class="nav-links" id="navLinks">
                <a href="/">Home</a>
                <a href="/products.html" class="active">Products</a>
                <a href="/about.html">About Us</a>
                <a href="/team.html">Team</a>
                <a href="/news.html">News</a>
                <a href="/gallery.html">Gallery</a>
                <a href="/contact.html">Contact</a>
                <a href="/contact.html" class="btn btn-primary nav-cta">Get Quote</a>
            </div>
            <button class="mobile-toggle" id="mobileToggle"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <!-- Product Detail -->
    <section class="section" style="padding-top: 120px;">
        <div class="container">
            <div id="productDetail">
                <!-- Loading state -->
                <div style="text-align: center; padding: 4rem;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 3rem; color: var(--seafoam);"></i>
                    <p style="margin-top: 1rem;">Loading product...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->`n  <div id="footerPlaceholder"></div>

    <button class="back-to-top" id="backToTop"><i class="fas fa-chevron-up"></i></button>

    <script src="/js/main.js"></script>
    <script>
        // Helper function to preserve line breaks
        function formatContent(text) {
            if (!text) return '';
            return text.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
        }

        document.addEventListener('DOMContentLoaded', loadProduct);

        async function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');

            console.log('Loading product with slug:', slug);

            if (!slug) {
                showError('No product specified');
                return;
            }

            try {
                const response = await fetch('/api/products');
                console.log('API response status:', response.status);
                
                if (!response.ok) {
                    throw new Error('Failed to fetch products');
                }

                const products = await response.json();
                console.log('All products:', products);
                console.log('Looking for slug:', slug);
                
                const product = products.find(p => p.slug === slug);
                console.log('Found product:', product);

                if (!product) {
                    showError('Product not found');
                    return;
                }

                displayProduct(product);
            } catch (error) {
                console.error('Error loading product:', error);
                showError('Failed to load product: ' + error.message);
            }
        }

        function displayProduct(product) {
            console.log('Displaying product:', product);
            console.log('Product name:', product.name);
            console.log('Product image:', product.featured_image);
            console.log('Product scientific name:', product.scientific_name);
            console.log('Product short desc:', product.short_description);
            console.log('Product full desc:', product.full_description);
            
            document.title = `${product.name || 'Product'} - Prawnique`;
            
            const container = document.getElementById('productDetail');
            
            const imageUrl = product.featured_image || 'https://images.unsplash.com/photo-1565680018434-b513d5e5fd47?w=600&h=600&fit=crop';
            const productName = product.name || 'Unnamed Product';
            const scientificName = product.scientific_name || '';
            const shortDesc = product.short_description || '';
            const fullDesc = product.full_description || '';
            
            let html = `
                <nav class="breadcrumb" style="margin-bottom: 2rem;">
                    <a href="/">Home</a> <span>/</span> 
                    <a href="/products.html">Products</a> <span>/</span> 
                    <span>${productName}</span>
                </nav>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start;">
                    <div>
                        <img src="${imageUrl}" 
                             alt="${productName}"
                             style="border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 600px;">
                    </div>
                    <div>
                        <h1 style="margin-bottom: 0.5rem; font-size: 2.5rem;">${productName}</h1>
            `;
            
            if (scientificName) {
                html += `<p style="color: #718096; font-style: italic; margin-bottom: 1.5rem; font-size: 1.1rem;">${scientificName}</p>`;
            }
            
            if (shortDesc) {
                html += `
                    <div style="background: #f7f3ef; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem;">
                        <p style="margin: 0; font-size: 1.1rem; line-height: 1.6;">${formatContent(shortDesc)}</p>
                    </div>
                `;
            }

            if (fullDesc) {
                html += `
                    <div style="margin-bottom: 2rem;">
                        <h3 style="margin-bottom: 1rem; font-size: 1.5rem;">Description</h3>
                        <div style="line-height: 1.8; color: #4a5568;">
                            ${formatContent(fullDesc)}
                        </div>
                    </div>
                `;
            }
            
            if (!shortDesc && !fullDesc) {
                html += `
                    <div style="background: #fff3cd; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border-left: 4px solid #ffc107;">
                        <p style="margin: 0; color: #856404;">
                            <i class="fas fa-info-circle"></i> No description available for this product yet. 
                            Please contact us for more information.
                        </p>
                    </div>
                `;
            }

            html += `
                        <div style="display: flex; gap: 1rem; margin-top: 2rem; flex-wrap: wrap;">
                            <a href="/contact.html" class="btn btn-primary" style="text-decoration: none;">
                                <i class="fas fa-envelope"></i> Request Quote
                            </a>
                            <a href="/products.html" class="btn btn-outline" style="text-decoration: none;">
                                <i class="fas fa-arrow-left"></i> Back to Products
                            </a>
                        </div>
                    </div>
                </div>
            `;
            
            console.log('Setting HTML, length:', html.length);
            container.innerHTML = html;
            console.log('HTML set successfully');
        }

        function showError(message) {
            console.error('Showing error:', message);
            const container = document.getElementById('productDetail');
            container.innerHTML = `
                <div style="text-align: center; padding: 4rem;">
                    <i class="fas fa-exclamation-circle" style="font-size: 3rem; color: var(--coral); margin-bottom: 1rem;"></i>
                    <h2>${message}</h2>
                    <p style="color: var(--gray); margin: 1rem 0 2rem;">The product you're looking for doesn't exist or has been removed.</p>
                    <a href="/products.html" class="btn btn-primary">View All Products</a>
                </div>
            `;
        }
    </script>
</body>

</html>
