<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="News article - Prawnique">
    <title>News - Prawnique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="/favicon.png">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar scrolled" id="navbar">
        <div class="container">
            <a href="/" class="logo"><img src="/img/logo.png" alt="Prawnique" class="logo-image"></a>
            <div class="nav-links" id="navLinks">
                <a href="/">Home</a>
                <a href="/products.html">Products</a>
                <a href="/about.html">About Us</a>
                <a href="/team.html">Team</a>
                <a href="/news.html" class="active">News</a>
                <a href="/gallery.html">Gallery</a>
                <a href="/contact.html">Contact</a>
                <a href="/contact.html" class="btn btn-primary nav-cta">Get Quote</a>
            </div>
            <button class="mobile-toggle" id="mobileToggle"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <!-- News Detail -->
    <section class="section" style="padding-top: 120px;">
        <div class="container">
            <div id="newsDetail">
                <!-- Loading state -->
                <div style="text-align: center; padding: 4rem;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 3rem; color: var(--seafoam);"></i>
                    <p style="margin-top: 1rem;">Loading article...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->`n  <div id="footerPlaceholder"></div>

    <button class="back-to-top" id="backToTop"><i class="fas fa-chevron-up"></i></button>

    <script src="/js/main.js"></script>
    <script>
        // Helper function to preserve line breaks
        function formatContent(text) {
            if (!text) return '';
            return text.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
        }

        document.addEventListener('DOMContentLoaded', loadNewsArticle);

        async function loadNewsArticle() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');

            if (!slug) {
                showError('No article specified');
                return;
            }

            try {
                const response = await fetch('/api/news');
                const data = await response.json();
                const article = data.posts ? data.posts.find(p => p.slug === slug) : data.find(p => p.slug === slug);

                if (!article) {
                    showError('Article not found');
                    return;
                }

                displayArticle(article);
            } catch (error) {
                console.error('Error loading article:', error);
                showError('Failed to load article');
            }
        }

        function displayArticle(article) {
            document.title = `${article.title} - Prawnique`;
            
            const container = document.getElementById('newsDetail');
            const publishedDate = article.published_at ? new Date(article.published_at).toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            }) : '';
            
            container.innerHTML = `
                <nav class="breadcrumb" style="margin-bottom: 2rem;">
                    <a href="/">Home</a> <span>/</span> 
                    <a href="/news.html">News</a> <span>/</span> 
                    <span>${article.title}</span>
                </nav>

                <article style="max-width: 800px; margin: 0 auto;">
                    <header style="text-align: center; margin-bottom: 3rem;">
                        <h1 style="font-size: 2.5rem; margin-bottom: 1rem; line-height: 1.2;">${article.title}</h1>
                        ${publishedDate ? `<p style="color: #718096; font-size: 1.1rem; margin-bottom: 2rem;"><i class="far fa-calendar"></i> ${publishedDate}</p>` : ''}
                        ${article.featured_image ? `<img src="${article.featured_image}" alt="${article.title}" style="width: 100%; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 2rem;">` : ''}
                    </header>
                    
                    <div style="font-size: 1.1rem; line-height: 1.8; color: #4a5568;">
                        ${article.excerpt ? `<div style="background: #f7f3ef; padding: 2rem; border-radius: 12px; margin-bottom: 2rem; font-size: 1.2rem; font-style: italic; border-left: 4px solid var(--seafoam);"><p>${formatContent(article.excerpt)}</p></div>` : ''}
                        
                        ${article.content ? `<div><p>${formatContent(article.content)}</p></div>` : ''}
                    </div>
                    
                    <div style="display: flex; gap: 1rem; margin-top: 3rem; justify-content: center; flex-wrap: wrap;">
                        <a href="/contact.html" class="btn btn-primary" style="text-decoration: none;">
                            <i class="fas fa-envelope"></i> Contact Us
                        </a>
                        <a href="/news.html" class="btn btn-outline" style="text-decoration: none;">
                            <i class="fas fa-arrow-left"></i> Back to News
                        </a>
                    </div>
                </article>
            `;
        }

        function showError(message) {
            const container = document.getElementById('newsDetail');
            container.innerHTML = `
                <div style="text-align: center; padding: 4rem;">
                    <i class="fas fa-exclamation-circle" style="font-size: 3rem; color: var(--coral); margin-bottom: 1rem;"></i>
                    <h2>${message}</h2>
                    <p style="color: var(--gray); margin: 1rem 0 2rem;">The article you're looking for doesn't exist or has been removed.</p>
                    <a href="/news.html" class="btn btn-primary">View All News</a>
                </div>
            `;
        }
    </script>
</body>

</html>
